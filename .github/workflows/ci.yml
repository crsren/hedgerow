name: CI

on:
  # `labeled`/`unlabeled` matter: the changeset gates are waived by adding a
  # label, and without these types adding one fires no run at all. Re-running
  # the failed job doesn't help either — a re-run replays the ORIGINAL event
  # payload, so the new label still wouldn't be visible.
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup reads it from the packageManager field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run typecheck build test

      # Catch packaging mistakes (bad exports, missing files, ESM/CJS slips)
      # before they ship. Runs after build so dist/ exists to inspect.
      # Discovered from the workspace, not hardcoded — a fifth package must
      # not be able to skip this by simply not being on a list.
      - name: publint all publishable packages
        run: pnpm -r --filter="./packages/*" exec publint

      # Pack each tarball and prove it resolves: no development condition or
      # raw src published, default conditions present, react keeps "use client".
      - name: verify packaging
        run: pnpm verify:packaging

      # The public API surface is committed (api-report/*.api.d.ts). A diff here
      # IS the answer to "is this change breaking?" — see CONTRIBUTING.md.
      - name: verify API report is up to date
        run: pnpm api:check

  # Enforces the changeset rules that protect version numbers, which are the
  # one thing about an npm publish that can never be taken back.
  changesets:
    name: changeset policy
    runs-on: ubuntu-latest
    steps:
      # Presence needs the base branch to diff against, so fetch full history.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # No install step: the script is dependency-free Node on purpose, so this
      # gate stays fast and can't be broken by an unrelated dependency problem.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Full policy on a PR: presence, bump-vs-API-surface, summary, 0.x rule.
      #
      # Skipped entirely for the Version Packages PR — it is generated by
      # changesets itself, and it CONSUMES changesets rather than adding one,
      # so the presence check would make the release PR permanently red.
      - name: changeset policy (pull request)
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref != 'changeset-release/main' &&
          !contains(github.event.pull_request.labels.*.name, 'no-changeset')
        run: >-
          node scripts/check-changesets.mjs
          --base origin/${{ github.base_ref }}
          ${{ contains(github.event.pull_request.labels.*.name, 'api-additive') && '--allow-api-removals' || '' }}

      # Everywhere else — main, the release PR, PRs waiving presence — the
      # rules that protect the version number itself still apply. A pre-1.0
      # `major` must never reach the Version Packages PR.
      - name: changeset policy (bump rules only)
        if: >-
          github.event_name != 'pull_request' ||
          github.head_ref == 'changeset-release/main' ||
          contains(github.event.pull_request.labels.*.name, 'no-changeset')
        run: node scripts/check-changesets.mjs

  # @hedgerow/react declares `react: ^18 || ^19`, but the workspace pins 18 —
  # so half that claim was never exercised. This leg runs the react suite
  # against 19 as well. It found a real bug the first time: renderElement read
  # both ref slots, which warns on 18 today AND would warn on 19.
  #
  # Deliberately NOT a matrix on the `build` job: `api:check` compares against
  # the committed api-report, and @types/react 19 emits different .d.ts text,
  # so those gates are only meaningful against the committed lockfile.
  react-compat:
    name: react ${{ matrix.react }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        react: ["18", "19"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The 18 leg is the lockfile as committed; only 19 needs an override.
      - name: Pin React 19
        if: matrix.react == '19'
        run: |
          node -e '
            const fs = require("fs");
            const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
            p.pnpm ??= {};
            p.pnpm.overrides = {
              ...p.pnpm.overrides,
              react: "^19.2.7",
              "react-dom": "^19.2.7",
              "@types/react": "^19.2.7",
              "@types/react-dom": "^19.2.2",
            };
            fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
          '

      - run: pnpm install --no-frozen-lockfile

      # .npmrc sets auto-install-peers=true, which can satisfy react from
      # somewhere other than the override and hand us a green "React 19" leg
      # that actually ran 18 — the exact failure this job exists to catch.
      - name: Assert the resolved React major
        run: |
          major=$(node -p "require('./packages/react/node_modules/react/package.json').version.split('.')[0]")
          echo "resolved react major: $major (expected ${{ matrix.react }})"
          test "$major" = "${{ matrix.react }}"

      - run: pnpm --filter @hedgerow/react test
      - run: pnpm --filter @hedgerow/react typecheck

