name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup reads it from the packageManager field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run typecheck build test

      # Catch packaging mistakes (bad exports, missing files, ESM/CJS slips)
      # before they ship. Runs after build so dist/ exists to inspect.
      - name: publint all publishable packages
        run: |
          for pkg in publish comments react reader; do
            echo "── publint @hedgerow/$pkg"
            (cd "packages/$pkg" && npx publint)
          done
