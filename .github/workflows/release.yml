# Release automation (Changesets) — versioning AND publishing.
#
# With changesets pending this opens a "Version Packages" PR and publishes
# nothing. With none pending it publishes whatever versions are on main that
# the registry doesn't have. Merging the version PR is what moves you from the
# first state to the second, which is why that merge IS the release decision.
#
# (Historical note: this ran versioning-only for its first weeks, because with
# `publish:` set `changeset publish` will publish any package whose version is
# absent from the registry — even with zero pending changesets. That bit us on
# the very first push, before the packages existed on npm. All four now exist
# at >= 0.1.0, so the empty-registry case can't recur.)
#
# Publishing will use npm TRUSTED PUBLISHING (OIDC) — no NPM_TOKEN secret ever.
# Trusted publishing can only be configured on packages that already exist, so:
#   1. First release runs from a maintainer machine (`pnpm release`, logged-in npm).
#      DONE — all four packages published at 0.1.0 on 2026-07-20.
#   2. On npmjs.com, per package: Settings -> Trusted Publisher -> GitHub Actions
#      -> repo crsren/hedgerow, workflow release.yml, environment npm-publish.
#   3. Make the repo public (provenance attestation needs an attestable source),
#      then set `publish: pnpm release` below.
#      DONE — 2026-07-21. Branch protection and the npm-publish environment are
#      configured by scripts/setup-release-protection.sh.
#
# WHEN A RELEASE GOES WRONG — the playbook, in order. Do NOT reach for
# unpublish: a name@version can never be reused even after a successful
# unpublish, and after 72h it's npm support's call anyway.
#   1. Publish the fix as a new patch version.
#   2. Move the tag:   npm dist-tag add @hedgerow/<pkg>@<good> latest
#      (dist-tags are the one fully reversible part of npm — seconds to fix.)
#   3. Warn installers: npm deprecate @hedgerow/<pkg>@<bad> "use <good>"
#      (reversible: deprecate with an empty string to undo.)
# The single exception is a leaked credential inside a tarball, where the
# bytes themselves are the problem — then unpublish immediately AND rotate the
# credential, because mirrors and scrapers have it within minutes regardless.

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Nothing at workflow level — each job takes only what it needs. This is what
# keeps the OIDC token out of the job that runs the dependency tree.
permissions: {}

# Third-party actions are SHA-pinned, not tag-pinned. This job can mint an npm
# publish credential via OIDC, and a moving tag means upstream (or anyone who
# compromises it) can change what runs inside that job. OIDC gives no
# protection here — the token is minted for the legitimate workflow; the
# malicious code would simply be running inside it. Dependabot keeps the pins
# current (see .github/dependabot.yml).
jobs:
  # Everything that executes third-party code — install, build, the test suite
  # and its whole transitive tree — runs HERE, with a read-only token and no
  # OIDC. Previously this shared a job with the publish step, which meant every
  # transitive dev dependency ran somewhere it could mint an npm credential for
  # all four packages.
  verify:
    name: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          # NO `registry-url:` on purpose. It writes an .npmrc line
          # (`_authToken=${NODE_AUTH_TOKEN}`) that, with trusted publishing and
          # therefore no token, expands to an empty auth header and produces an
          # ENEEDAUTH that looks like an OIDC misconfiguration but isn't.

      - run: pnpm install --frozen-lockfile

      - name: typecheck / build / test
        run: pnpm turbo run typecheck build test

      - name: publint all publishable packages
        run: pnpm -r --filter="./packages/*" exec publint

      - name: verify packaging
        run: pnpm verify:packaging

      - name: verify API report is up to date
        run: pnpm api:check

      # Hand the built output to the publish job so it never has to run a
      # build — the tarballs published are byte-for-byte the ones verified
      # here, and the publish job needs no dev toolchain at all.
      - name: upload built packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: packages/*/dist
          retention-days: 1
          if-no-files-found: error

  # The only job that can mint an npm credential. It runs no build, no tests,
  # and installs with --ignore-scripts, so no third-party postinstall executes
  # while OIDC is in scope. `needs: verify` is a hard dependency inside one
  # workflow — the guarantee the previous single-job layout was protecting
  # (a failed check must stop the publish) is preserved, without the token
  # being present while the dependency tree runs.
  publish:
    name: version or publish
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write # push the version PR / tags
      pull-requests: write # open & update the "Version Packages" PR
      id-token: write # npm provenance (OIDC)
    # Scopes the npm trusted publisher to this workflow AND this environment,
    # so a future workflow file can't mint a publish token. Deliberately has
    # NO required reviewers: the real approval is merging the Version Packages
    # PR, where the actual version numbers and changelog are visible. A second
    # click you always say yes to just dilutes the one that matters.
    environment: npm-publish
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          # NO `registry-url:` on purpose. It writes an .npmrc line
          # (`_authToken=${NODE_AUTH_TOKEN}`) that, with trusted publishing and
          # therefore no token, expands to an empty auth header and produces an
          # ENEEDAUTH that looks like an OIDC misconfiguration but isn't.

      # `pnpm publish` shells out to the SYSTEM npm, and OIDC trusted
      # publishing lives in the npm CLI: it needs npm >= 11.5.1 (and Node >=
      # 22.14). setup-node's Node 22 image ships npm 10.x, which would fail at
      # publish time with an auth error that looks like a trusted-publisher
      # misconfiguration. Upgrade explicitly, and assert it, so a future image
      # change can't silently reintroduce this.
      - name: ensure an OIDC-capable npm
        run: |
          npm install -g npm@^11.5.1
          node -e "
            const [maj, min] = process.versions.node.split('.').map(Number);
            if (maj < 22 || (maj === 22 && min < 14)) {
              throw new Error('Node ' + process.versions.node + ' is below the 22.14 that OIDC publishing needs');
            }
          "
          node -e "
            const v = require('child_process').execSync('npm --version').toString().trim();
            const [maj, min, patch] = v.split('.').map(Number);
            const ok = maj > 11 || (maj === 11 && (min > 5 || (min === 5 && patch >= 1)));
            if (!ok) throw new Error('npm ' + v + ' cannot do OIDC trusted publishing (need >= 11.5.1)');
            console.log('npm ' + v + ' — OIDC capable');
          "

      # --ignore-scripts: no package's install hooks run in the job holding the
      # OIDC token. changesets and its deps need no postinstall to work.
      - run: pnpm install --frozen-lockfile --ignore-scripts

      # The exact dist/ that `verify` built and checked.
      - name: download built packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: packages

      # Two modes, decided by whether changesets are pending:
      #   pending  -> opens/updates the "Version Packages" PR (publishes nothing)
      #   none     -> the version PR was merged, so publish what's on main
      # Merging that PR is therefore the release decision.
      #
      # `release:ci` is `changeset publish` alone — the verification that
      # `pnpm release` runs locally has already happened in the `verify` job,
      # and re-running it here would put the whole toolchain back inside the
      # OIDC-scoped job, which is the thing this split exists to prevent.
      - name: Create Release PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          publish: pnpm release:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
