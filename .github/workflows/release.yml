# Release automation (Changesets) — VERSIONING ONLY for now.
#
# The changesets action deliberately has NO `publish:` input yet, so it only
# ever opens/updates a "Version Packages" PR and can never push to npm.
# (Lesson learned: with `publish:` set, `changeset publish` attempts to publish
# any package whose version is absent from the registry — even with zero
# pending changesets. It tried on the very first push.)
#
# To enable real publishing later, all three of:
#   1. Create the @hedgerow org on npm and add an NPM_TOKEN repo secret.
#   2. Make the repo public (npm provenance needs an OIDC-attestable source).
#   3. Restore `publish: pnpm release` on the changesets/action step below.

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # push the version PR / tags
  pull-requests: write # open & update the "Version Packages" PR
  id-token: write # npm provenance (OIDC)

jobs:
  release:
    name: version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Opens/updates a "Version Packages" PR when changesets are pending.
      # No `publish:` input — see header comment before adding one.
      - name: Create Release PR
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
