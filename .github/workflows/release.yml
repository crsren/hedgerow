# Release automation (Changesets) — VERSIONING ONLY for now.
#
# The changesets action deliberately has NO `publish:` input yet, so it only
# ever opens/updates a "Version Packages" PR and can never push to npm.
# (Lesson learned: with `publish:` set, `changeset publish` attempts to publish
# any package whose version is absent from the registry — even with zero
# pending changesets. It tried on the very first push.)
#
# Publishing will use npm TRUSTED PUBLISHING (OIDC) — no NPM_TOKEN secret ever.
# Trusted publishing can only be configured on packages that already exist, so:
#   1. First release runs from a maintainer machine (`pnpm release`, logged-in npm).
#   2. On npmjs.com, per package: Settings -> Trusted Publisher -> GitHub Actions
#      -> repo crsren/hedgerow, workflow release.yml.
#   3. Make the repo public (OIDC needs an attestable source), ensure the runner
#      has an OIDC-capable npm CLI (recent npm; add an npm upgrade step if the
#      image's is too old), then restore `publish: pnpm release` below.
#      `permissions: id-token: write` below is already in place for this.

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # push the version PR / tags
  pull-requests: write # open & update the "Version Packages" PR
  id-token: write # npm provenance (OIDC)

jobs:
  release:
    name: version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Opens/updates a "Version Packages" PR when changesets are pending.
      # No `publish:` input — see header comment before adding one.
      - name: Create Release PR
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
