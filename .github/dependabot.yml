version: 2
updates:
  # Keeps the SHA pins in release.yml current. Pinning without this just means
  # running old actions forever — Dependabot resolves the tag, bumps the SHA,
  # and updates the trailing `# v4` comment, so the pin stays honest.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    commit-message:
      prefix: "ci"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    commit-message:
      prefix: "chore"
    # Group only minor/patch dev-tooling updates. Grouping MAJORS was a
    # mistake: the first grouped PR bundled typescript 5->7, vitest 2->4,
    # jsdom 25->29 and @types/node 22->26 into one diff, where any single
    # failure blocks all six and attributing it means unpicking the group by
    # hand. Majors now arrive one per PR, which is the whole point of a major.
    groups:
      dev-tooling:
        dependency-type: development
        update-types: ["minor", "patch"]
    # Runtime deps of published packages change what consumers install, so they
    # get their own PR and their own changeset decision.
    open-pull-requests-limit: 5
